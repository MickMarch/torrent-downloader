[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "torrent-downloader"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "parse-torrent-title>=2.8.2",
    "psutil>=7.2.2",
    "pydantic-settings>=2.14.1",
    "qbittorrent-api>=2026.5.1",
    "requests>=2.34.0",
]

[project.scripts]
torrent-downloader = "torrent_downloader.main:main"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-mock>=3.15.1",
]
